  text: 太極圖說重刋道藏輯要太極圖周子作朱子注
  hash: sha256:02fec1c6398e27c7a3513c0471debe6d0b6e27b4b6aa96def545a6b4e6b1ebe8
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-BS_KR5i0079_01p001a}
body:
  text: 朱子曰河圖出而八卦畫洛書呈而九疇敘而孔子於斯文之興喪亦未嘗不推之於天自周衰孟軻氏沒而此道之傳不屬更秦及漢厯晉隋唐以至於我有宋五星集奎實開文明之運而先生出焉不由師傳默契道體建圖屬書根極領要當時見而知之有程氏者遂擴大而推明之使夫天理之微人倫之著事物之衆鬼神之幽莫不洞然畢貫於一而周公孔子孟氏之傳煥然復明於當世有志之士得以探討服行而不失其正如出於三代之前者鳴呼盛哉非天所𢌿其孰能與於此又曰先生之學其妙具於太極一圖通書之言亦皆此圖之藴而程先生兄弟語及性命之際亦未嘗不因其說觀通書之誠動靜理性命等章及程氏書李仲通銘程邵公志顏子好學論等篇則可見矣潘淸逸志先生之墓敘所著書特以作太極圖為稱首然則此圖當為先生書首無疑也然先生既手以授二程因附書後傳者見其如此遂誤以圖為書之卒章不復釐正使先生立象盡意之微指暗而不明而驟讀通書者亦復不知有所總攝此則諸本之失也又嘗讀朱內翰震進易說表謂此圖之傳自陳摶种放穆修而來而五峯胡氏作序又以為先生非止為种穆之學者此特其學之一師爾非其至者也夫以先生之學之妙不出此圖以為得之於人則決非种穆所及以為非其至者則先生之學又何以加於此圖哉是以竊嘗疑之及得志文考之然後知其果先生所自作而非有受於人者二公蓋未嘗見此志而云云爾太極圖說此所謂無極而太極也所以動而陽靜而陰之本體也然非有以離乎陰陽也即陰陽而指其本體不雜乎陰陽而為言耳此之動而陽靜為陰也中者其本體也者陽之動也之用所以行也者陰之靜也之體所以立也者之根也者之根也此陽變陰合而生水火木金土也者陽之變也者陰之合也水陰盛故居右火陽盛故居左木陽稚故次火金陰稚故次水土冲氣故居中而水火之交系乎上陰根陽陽根陰也水而木木而火火而土土而金金而復水如環無端五氣布四時行也五行一陰陽五殊二實無餘缺也陰陽一太極精粗本末無彼此也太極本無極上天之載無聲臭也五行之生各一其性氣殊質異各一其無假借也此無極二五所以妙合而無閒也乾男坤女以氣化者言也各一其性而男女一太極也萬物化生以形化者言也各一其性而萬物一太極也此以上引說解剝圖體此以下據圖推盡說意惟人也得其秀而最靈則所謂人者於是乎在矣然形之為也神之發也五性之德也善惡男女之分也萬事萬物之象也此天下之動所以紛綸交錯而吉凶悔吝所由以生也惟聖人者又得夫秀之精一而有以全乎之體用者也是以一動一靜各臻其極而天下之故常感通乎寂然不動之中蓋中也仁也感也所謂也之用所以行也正也義也寂也所謂也之體所以立也中正仁義渾然全體而靜者常為主焉則人於是乎立而天地日月四時鬼神有所不能違矣君子之戒愼恐懼所以修此而吉也小人之放僻邪侈所以悖此而凶也天地人之道各一也陽也剛也仁也所謂也物之始也陰也柔也義也所謂也物之終也此所謂易也而三極之道立焉實則一也故曰易有太極之謂也無極而太極注上天之載無聲無臭而實造化之樞紐品彙之根柢也故曰無極而太極非太極之外復有無極也集說朱子曰太極圖只是一箇實理一以貫之又曰老子之言有無以有無為二周子之言有無以有無為一又曰謂之無極正以其無方所形狀以為在無物之前而未嘗不立於有物之後以為在陰陽之外而未嘗不行於陰陽之中以為通貫全體無乎不在則又初無聲臭影響之可言也又曰原極之所以得名蓋取樞極之義聖人謂之太極者所以指夫天地萬物之根也周子因之而又謂之無極者所以著無聲無臭之妙也又曰先生之精立圖以示先生之藴因圖以發而其所為無極而太極云者又一圖之綱領所以明夫道之未始有物而實為萬物之根柢也夫豈以為太極之上復有所謂無極哉近世讀者不足以識此而或妄議之既以為先生病史氏之傳先生者乃增其語曰自無極而為太極則人無所依據而重以病夫先生又曰周子所謂無極而太極非謂太極之上別有無極也但言太極非有物耳故下文云無極之真二五之精既言無極則不復别舉太極也若如今說則此處豈不缺一太極字耶或問所謂無極而太極者亦可得而聞其說之詳乎饒氏魯曰難言也姑以名義推之所謂太極者蓋天理之尊號云爾極者至極之義樞紐根柢之名世之常言所謂樞極根極是也聖人以陰陽五行闔闢不窮而此理為闔闢之主如戶之有樞紐男女萬物生生不息而此理為生生之本如木之有根柢至其在人則萬善之所以生萬事之所以定者亦莫非此理為之根柢為之樞紐焉是故謂之極太者大無以加之稱言其為天下之大樞紐大根柢也然凡謂之極者如南極北極屋極商邑四方之極之類皆有形狀之可見方所之可指而此極獨無形狀之方所故周子復加無極二字以明之以其無樞紐根柢之形而實為天下之大樞紐大根柢也故曰無極而太極以其為天下之大樞紐大根柢也而初非有樞紐根柢之形也故曰太極本無極也此雖名義之粗然先儒嘗云讀書之法當先曉其文義文義既通然後可以求其意學者苟知此義而於日用之間端莊靜一以養之於未發之時而驗之於已發之際則是理之妙或者亦可以默識矣太極動而生陽動極而靜靜而生陰靜極復動一動一靜互為其根分陰分陽兩儀立焉注太極之有動靜是天命之流行也所謂一陰一陽之謂道誠者聖人之本物之終始而命之道也其動也誠之通也繼之者善萬物之所資以始也其靜也誠之復也成之者性萬物各正其性命也動極而靜靜極復動一動一靜互為其根命之所以流行而不已也動而生陽靜而生陰分陰分陽兩儀立焉分之所以一定而不移也蓋太極者本然之妙也動靜者所乘之機也太極形而上之道也陰陽形而下之器也是以自其著者而觀之則動靜不同時陰陽不同位而太極無不在焉自其微者而觀之則冲漠無朕而動靜陰陽之理已悉具於其中矣雖然推之於前而不見其始之合引之於後而不見其終之離也故程子曰動靜無端陰陽無始非知道者孰能識之集說朱子曰太極生陰陽理生氣也陰陽既生則太極在其中理復在氣之內也又曰性猶太極也心猶陰陽也太極只在陰陽之中非能離陰陽也然至論太極則太極自是太極陰陽自是陰陽惟性與心亦然所謂一而二二而一也又曰太極動而生陽靜而生陰不是動後方生陽蓋才動便屬陽才靜便屬陰又曰太極未動之前便是陰陰靜之中自有陽之根陽動之中自有陰之根動之所以必靜者根乎陰故也靜之所以必動者根乎陽故也問太極之有動靜是靜先動後否曰一動一靜循環無端無靜不成動無動不成靜譬如鼻息無時不噓無時不吸噓盡則生吸吸盡則生噓理自如此又曰陰陽有箇流行底有箇定位底一動一靜互為其根是流行底寒暑往來是也分陰分陽兩儀立焉是定位底天地四方是也易有兩義一曰變易便是流行底一曰交易便是對峙底吳氏澄曰太極無動靜動靜者氣機也氣機一動則太極亦動氣機一靜則太極亦靜故朱子釋太極圖曰太極之有動靜是天命之流行也此是為周子分解太極不當言動靜以天命之有流行故只得以動靜言也又曰太極者本然之妙也動靜者所乘之機也機猶弩牙弩弦乘此機機動則弦發機靜則弦不發氣動則太極亦動氣靜則太極亦靜太極之乘此氣猶弩弦之乘機也故曰動靜者所乘之機謂其所乘之氣機有動靜而太極本然之妙無動靜也然弦與機𨚫是兩物太極與此氣非有兩物只是主宰此氣者非别有一物在氣中而主宰之也機字是借物為喻不可以辭害意陽變陰合而生水火木金土五氣順布四時行焉注有太極則一動一靜而兩儀分有陰陽則一變一合而五行具然五行者質具於地而氣行於天者也以質而語其生之序則曰水火木金土而水木陽也火金陰也以氣而語其行之序則曰木火土金水而木火陽也金水陰也又統而言之則氣陽而質陰也又錯而言之則動陽而靜陰也蓋五行之變至於不可窮然無適而非陰陽之道至其所以為陰陽者則又無適而非太極之本然也夫豈有所虧缺閒隔哉集說朱子曰陽變陰合初生水火水火氣也流動閃爍其體尚虛其成形猶未定次生木金則確然有定形矣水火初是自生木金則資於土又曰水質陰而性本陽火質陽而性本陰水外暗而內明以其根於陽也火外明而內暗以其根於陰也太極圖陽動之中有黑底陰靜之中有白底是也橫渠言陰陽之精互藏其宅正此意也又曰金木水火分屬春夏秋冬土則寄旺四季惟夏季十八日土氣為最旺以圖象考之木生火金生水之類各有小畫相牽聯而火生土土生金獨穿乎土之內餘則從旁而過為可見矣問以質而語其生之序此豈就圖而指其序耶而水木何以謂之陽火金何以謂之陰曰天一生水地二生火天三生木地四生金一三陽也二四陰也問以氣而語其行之序豈即其運用處而言之耶而木火何以謂之陽金水何以謂之陰曰此以四時而言春夏為陽秋冬為陰黃氏幹曰五行之序以質之所生而言則水本是陽之濕氣以其初動為陰所陷而不得遂故水陰勝火本是陰之燥氣以其初動為陽所掩而不得達故火陽勝木則陽之濕氣寖多以感於陰而舒其質柔其性暖金則陰之燥氣寖多以感於陽而縮其質剛其性寒土則陰陽之氣各盛相交相搏凝而成質以氣之行而言則一陰一陽往來相代木火金水云者各就其中而分老少爾故其序各由少而老土則分旺四季而位居中者也此五者序若參差而造化所以為發育之具實並行而不相悖質曰水火木金蓋以陰陽相閒言猶曰東西南北所謂對待者也氣曰木火金水蓋以陰陽相因言猶曰東南西北所謂流行者也案朱子雖以陰陽分質之序氣之序然實陰陽合體氣質同歸何則天一陽也加五為六即地之陰也地二陰也加五為七即天之陽也三與八四與九亦然其陰陽合體者如此是故以氣言之以冬春為陽夏秋為陰可也以陽氣生於冬至而盛於春陰氣生於夏至而盛於秋也以春夏為陽秋冬為陰亦可也以陽功發於春而極於夏陰功成於秋而終於冬也以質言之以水木為陽火金為陰可也水之滋潤故能生木陽之舒也火之燥烈故能成金陰之斂也以木火為陽金水為陰亦可也木溫火熱氣禀乎陽也金涼水寒氣禀乎陰也又通而言之則陽始於水盛於木極於火而終於金陰始於火盛於金極於水而終於木此又時令與物理皆然而無氣質之異者也讀者不可不知五行一陰陽也陰陽一太極也太極本無極也五行之生也各一其性注五行具則造化發育之具無不備矣故又即此而推本之以明其渾然一體莫非無極之妙而無極之妙亦未嘗不各具於一物之中也蓋五行異質四時異氣而皆不能外乎陰陽陰陽異位動靜異時而皆不能離乎太極至於所以為太極者又初無聲臭之可言是性之本體然也天下豈有性外之物哉然五行之生隨其氣質而所禀不同所謂各一其性也各一其性則渾然太極之全體無不各具於一物之中而性之無所不在又可見矣集說朱子曰五行一陰陽陰陽一太極則非太極之後别生二五而二五之上先有太極也無極而太極太極本無極則非無極之後别生太極而太極之上先有無極也問無極太極本非二物曰無極而太極而無極之中萬象森列不可謂之無矣太極本無極則太極之體冲漠無朕不可謂之有矣問先生答書言陰陽五行之為性各是一氣所禀而性則一也兩性字同否曰一般又曰同者理也不同者氣也又曰金木水火土雖曰五行各一其性然一物又各具五行之理不可不知康節曾細推來無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉注夫天下無性外之物而性無不在此無極二五所以混融而無閒者也所謂妙合者也真以理言無妄之謂也精以氣言不二之名也凝者聚也氣聚而成形也蓋性為之主而陰陽五行為之經緯錯綜又各其類凝聚而成形焉陽而健者成男則父之道也陰而順者成女則母之道也是人物之始以氣化而生者也氣聚成形則形交氣感遂以形化而人物生生變化無窮矣自男女而觀之則男女各一性而男女一太極也自萬物而觀之則萬物各一其性而萬物一太極也蓋合而言之萬物統體一太極也分而言之一物各具一太極也所謂天下無性外之物而性無不在者於此尤可以見其全矣子思子曰君子語大天下莫能載焉語小天下莫能破焉此之謂也集說問周子言無極之真𨚫又不言太極如何朱子曰無極之真已該得太極在其中真字便是太極又曰太極如一本生上分而為枝幹又分而生花生葉生生不窮到得成果子裏面又有生生無窮之理生將出去又是無限箇太極更無停息又曰太極只是箇極好至善底道理人人有一太極物物有一太極周子所謂太極是天地人物萬善至好底表德問先天太極二圖曰先天乃伏羲本圖非康節所自作雖無言語而所該甚廣凡今易中一字一義無不自其中流出者太極𨚫是濂溪自作發明易中大槩綱領意思而已校論其格局則太極不如先天之大而詳論其義理則先天不如太極之精而約蓋合下規模不同而太極終在先天範圍之內又不若彼之自然不假思慮安排也若以數言之則先天之數自一而二自二而四自四而八以為八卦太極之數亦自一而二自二而四遂加其一以為五行而遂下及於萬物蓋物理本同而象數亦無二致但推得有大小詳略耳陳氏埴曰氣化謂未有種類之初以陰陽之氣合而生形化謂既有種類之後以牝牡之形合而生皆兼人物言之真氏德秀曰萬物各具一理萬理同出一原所謂萬理一原者太極也太極者乃萬理總會之名有理即有氣分而二則為陰陽分而五則為五行萬事萬物皆原於此人與物得之則為性性者即太極也仁義即陰陽仁義禮智信即五行也萬物各具一理是物物一太極也萬理同出一原是萬物統體一太極也案無極之真真即誠也通書誠字實根於此又案圖末二圓象與上圓象不二則知人之性即天地之性渾然合一而無加損也然氣化形化似不必分而周子必分為二象者則有深意焉蓋人之體性受於父母易知也人之體性受於天地則習焉不察者多矣故自男女搆精而遡夫天地絪緼之始由父子似續而推於厥初生民之先則知父母之為父母又知乾坤之為大父母矣為父母之子則身體髮膚受之者不敢毁傷為天地之子則形色天性必如聖人然後可以踐形也此即西銘之大指然已具於周子圖象之中矣惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣注此言衆人具動靜之理而常失之於動也蓋人物之生莫不有太極之道焉然陰陽五行氣質交運而人之所禀獨得其秀故其心為最靈而有以不失其性之全所謂天地之心而人之極也然形生於陰神發於陽五常之性感物而動而陽善陰惡又以類分而五性之殊散為萬事蓋二氣五行化生萬物其在人者又如此自非聖人全體太極有以定之則欲動情勝利害相攻人極不立而違禽獸不遠矣集說朱子曰只一箇陰陽五行之氣滾在天地中精英者為人渣滓者為物精英之中又精英者為聖為賢精英之中渣滓者為愚不肖問靈處是心抑是性曰靈處只是心不是性性只是理又曰形既生矣形體陰之為也神發知矣神知陽之為也蓋陰主翕凡斂聚成就者陰為之也陽主闢凡發暢揮散者皆陽為之也又曰仁義禮智信之性即水火木金土之理木仁金義火禮水智各有所主獨土無位又為四行之實故信亦無位而為四德之實也問通書多說幾太極圖却無此意曰五性感動善惡未分處便是問感物而動或發於理義之公或發於血氣之私這裏便分善惡曰非發於血氣之私便為惡乃發後流而為惡耳又曰太極便是性動靜陰陽是心金木水火土是仁義禮智信化生萬物是萬事聖人定之以中正仁義聖人之道仁義中正而已矣而主靜無欲故靜立人極焉故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶注此言聖人全動靜之德而常本之於靜也蓋人禀陰陽五行之秀氣以生而聖人之生又得其秀之秀者是以其行之也中其處之也正其發之也仁其裁之也義蓋一動一靜莫不有以全夫太極之道而無所虧焉則向之所謂欲動情勝利害相攻者於此乎定矣然靜者誠之復而性之真也苟非此心寂然無欲而靜則又何以酬酢事物之變而一天下之動哉故聖人中正仁義動靜周流而其動也必主乎靜此其所以成位乎中而天地日月四時鬼神有所不能違也蓋必體立而後用有以行若程子論乾坤動靜而曰不專一則不能直遂不翕聚則不能發散亦此意爾集說問周子不言禮智而言中正如何朱子曰禮智說得猶寬中正則切而實矣且謂之禮尚或有不中節處若謂之中則無過不及無非禮之禮乃節文恰好處也謂之智尚或有正不正若謂之正則是非端的分明乃智之實也問中正仁義而主靜中仁是動正義是靜如先生解曰非此心無欲而靜則何以酬酢事物之變而一天下之動哉今於此心寂然無欲而靜處欲見所謂正義者何以見曰見理之定體便是又曰中正仁義分屬動靜而聖人則主於靜蓋正所以能中義所以能仁易言利貞者性情也元亨是發用處必至於利貞乃見乾之實體萬物到秋冬收斂成實方見得他本質故曰性情此亦主靜之說也李氏方子曰人生而靜性之本體湛然無欲斯能主靜此立極之要領也黃氏巖孫曰天地日月四時鬼神皆不能外乎太極陰陽五行之理聖人一身兼具此理者也與天地合德是其德性純全即太極之渾融與日月合明是其智晰昭融即陰陽之昭著與四時合序是其誠通誠復即五行之順布與鬼神合吉凶是其存神過化即四時變化五行屈伸也君子修之吉小人悖之凶注聖人太極之全體一動一靜無適而非中正仁義之極蓋不假修為而自然也未至此而修之君子之所以吉也不知此而悖之小人之所以凶也修之悖之亦在乎敬肆之間而已矣敬則欲寡而理明寡之又寡以至於無則靜虛動直而聖可學矣故曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知死生之說注陰陽成象天道之所以立也剛柔成質地道之所以立也仁義成德人道之所以立也道一而已隨處著見故有三才之别而於其中又各有體用之分焉其實則一太極也陽也剛也仁也物之始也陰也柔也義也物之終也能原其始而知所以生則反其終而知所以死矣此天地之間綱紀造化流行古今不言之妙聖人作易其大意蓋不出此故引之以證其說集說朱子曰陽主進而陰主退陽主息而陰主消進而息者其氣强消而退者其氣弱此陰陽之所以為柔剛也陽剛溫厚居東南主春夏而以作長為事陰柔嚴凝居西北主秋冬而以斂藏為事作長為生斂藏為殺此剛柔之所以為仁義也以此觀之則陰陽剛柔仁義之位豈不曉然而彼揚子所謂於仁也柔於義也剛者乃自其用處未流言之蓋亦所謂陽中之陰陰中之陽固不妨自為一義但不可雜乎此而論之耳案此節引易以證前文之意立天之道曰陰與陽則四時之氣是也立地之道曰柔與剛則五行之質是也立人之道曰仁與義則五性感動而必定之以中正仁義也真精合凝化生萬物者人物之所以始而生之說也聖人立人之極與天地參人物之所以終而死之說也引此之意所以明夫三才之道並立而人必全受而全歸之蓋亦西銘卒章之指也大哉易也斯其至矣注易之為書廣大悉備然語其至極則此圖盡之其指豈不深哉抑嘗聞之程子昆弟之學於周子也周子手是圖以授之程子之言性與天道多出於此然卒未嘗明以此圖示人是則必有微意焉學者亦不可以不知也注後記熹既為此說嘗録以寄廣漢張敬夫敬夫以書來曰二先生所與門人講論問答之言見於書者詳矣其於西銘蓋屢言之至此圖則未嘗一言及也謂其必有微意是則固然然所謂微意者果何謂耶熹竊謂以為此圖立象盡意剖析幽微周子蓋不得已而作也觀其手授之意蓋以為惟程子為能當之至程子而不言則疑其未有能受之者爾夫既未能默識於言意之表則馳心空妙入耳出口其斃必有不勝言者觀其答張閎中論易傳成書深患無受之者及東見録中論橫渠清虛一大之說使人向別處走不若且只道敬則其意亦可見矣若西銘則推人以之天即近以明遠於學者日用最為親切非若此書詳於性命之原而略於進為之目有不可以驟而語者也孔子雅言詩書執禮而於易則鮮及焉其意亦猶此耳韓子曰堯舜之利民也大禹之慮民也深熹於周子程子亦云既以復於敬夫因記其說於此附朱子太極說動靜無端陰陽無始天道也始於陽成於陰本於靜流於動者人道也然陽復本於陰靜復根於動其動靜亦無端陰陽亦無始則人蓋未始離乎天而天亦未始離乎人也元亨誠之通動也利貞誠之復靜也元者動之端也本乎靜貞者靜之質也著乎動一動一靜循環無窮而貞也者萬物之所以成終而成始者也故人雖不能不動而立人極者必主乎靜惟主乎靜則其著乎動也無不中節而不失其本然之靜矣靜者性之所以立也動者命之所以行也然其實則靜亦動之息爾故一動一靜皆命之行而行乎動靜者乃性之真也故曰天命之謂性情之未發者性也是乃所謂中也天下之大本也性之已發者情也其皆中節則所謂和也天下之達道也皆天理之自然也妙性情之德者心也所以致中和立大本而行達道者也天理之主宰也靜而無不該者性之所以為中也寂然不動者也動而無不中者情之發而得其正也感而遂通者也靜而常覺動而常止者心之妙也寂而感感而寂者也
